<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Service AI Tool</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background-color: #f5f5f5; }
    h1 { text-align: center; }
    textarea { width: 100%; height: 150px; margin-bottom: 10px; padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    #output { margin-top: 20px; padding: 15px; background-color: #fff; border: 1px solid #ddd; min-height: 100px; }
  </style>
</head>
<body>
  <h1>Customer Service AI Tool</h1>

  <textarea id="complaintInput" placeholder="Enter customer complaint here..."></textarea>
  <button id="submitBtn">Submit</button>

  <div id="output">AI response will appear here...</div>

  <script>
    const submitBtn = document.getElementById('submitBtn');
    const inputBox = document.getElementById('complaintInput');
    const outputBox = document.getElementById('output');

    submitBtn.addEventListener('click', () => {
      const complaint = inputBox.value.trim();
      if (!complaint) {
        outputBox.textContent = 'Please enter a complaint.';
        return;
      }

      outputBox.textContent = 'Generating AI response...';

      // Replace this URL with your Make webhook URL
      const webhookUrl = 'YOUR_MAKE_WEBHOOK_URL_HERE';

      fetch(webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ complaint })
      })
      .then(response => response.json())
      .then(data => {
        // Update this if your Make scenario returns a different key
        outputBox.textContent = data.response || 'No response received.';
      })
      .catch(err => {
        console.error(err);
        outputBox.textContent = 'Error fetching AI response.';
      });
    });
  </script>
</body>
</html>
